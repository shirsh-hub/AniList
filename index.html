<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anime List</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="page">
    <section class="hero">
      <h1>Anime Finder</h1>
      <p class="subtitle">Search anime titles and browse quick details like score, episode count, and release year.</p>
    </section>

    <section class="search-panel">
      <form id="search-form" class="search-form">
        <input
          id="search-input"
          class="search-input"
          type="search"
          placeholder="Search for Naruto, One Piece, Death Note..."
          aria-label="Search anime"
          required
        >
        <button id="search-button" class="search-button" type="submit">Search Anime</button>
      </form>
      <p id="status" class="status">Try searching for your favorite anime.</p>
    </section>

    <section id="container" aria-live="polite"></section>
  </main>

  <script src="script.js"></script>
</body>
</html>
